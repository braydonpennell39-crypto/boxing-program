<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Boxing"/>
<meta name="theme-color" content="#0f0f11"/>
<title>Boxing Program</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>

<style>
/* ─── RESET & BASE ─────────────────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0f0f11; --surface:#17171a; --surface2:#1e1e22; --border:#2a2a2e;
  --text:#e8e8ed; --muted:#8a8a9a; --green:#4ade80; --green-dim:#1a3a25;
  --yellow:#facc15; --red:#f87171; --blue:#60a5fa; --orange:#fb923c;
  --radius:10px; --safe-bottom:env(safe-area-inset-bottom,0px);
  --font:'DM Sans',sans-serif; --font-head:'Playfair Display',serif;
}
html{height:100%;}
body{
  background:var(--bg); color:var(--text); font-family:var(--font);
  font-size:14px; line-height:1.5; min-height:100%;
  overscroll-behavior:none; -webkit-font-smoothing:antialiased;
}

/* ─── LAYOUT ───────────────────────────────────────────────────────────────── */
.app{
  max-width:860px; margin:0 auto;
  padding:env(safe-area-inset-top,20px) 16px calc(var(--safe-bottom) + 70px);
  min-height:100vh;
}

/* ─── HEADER ───────────────────────────────────────────────────────────────── */
.header{text-align:center;margin-bottom:24px;padding-top:12px;}
.header h1{font-family:var(--font-head);font-size:26px;color:var(--green);letter-spacing:-.5px;}
.header .sub{color:var(--muted);font-size:12px;margin-top:3px;}
.week-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:4px 14px;font-size:12px;color:var(--muted);margin-top:8px;
}
.week-badge .wnum{color:var(--green);font-weight:700;font-size:14px;}
.week-badge button{
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-size:18px;line-height:1;padding:0 2px;
}
.week-badge button:hover{color:var(--text);}

/* ─── BOTTOM NAV (mobile) / TOP TABS (desktop) ─────────────────────────────── */
.tabs-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;padding:0 8px calc(var(--safe-bottom) + 4px) 8px;
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:2px;padding:7px 2px;background:none;border:none;
  color:var(--muted);font-family:var(--font);font-size:9px;
  font-weight:500;cursor:pointer;border-radius:8px;transition:color .15s;
}
.tab-btn i{font-size:19px;}
.tab-btn.active{color:var(--green);}

/* Desktop: top tab bar */
@media(min-width:600px){
  .tabs-bar{
    position:static;border-top:none;border-bottom:1px solid var(--border);
    background:var(--surface);border-radius:var(--radius);
    margin-bottom:20px;padding:4px;gap:4px;
  }
  .tab-btn{
    flex-direction:row;gap:6px;padding:9px 12px;font-size:13px;
    border-radius:7px;
  }
  .tab-btn i{font-size:15px;}
  .tab-btn.active{background:var(--surface2);border:1px solid var(--border);}
  .app{padding-bottom:20px;}
}

/* ─── DAY GRID ─────────────────────────────────────────────────────────────── */
.day-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(108px,1fr));gap:10px;margin-bottom:18px;}
.day-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px 8px;cursor:pointer;
  transition:border-color .15s;text-align:center;user-select:none;
}
.day-card:active{opacity:.8;}
.day-card.selected{border-color:var(--green);background:var(--green-dim);}
.day-card.rest-day{opacity:.55;}
.day-icon{font-size:22px;display:block;margin-bottom:5px;}
.day-name{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px;}
.day-label{font-size:11px;font-weight:600;color:var(--text);line-height:1.3;}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;margin-top:6px;}
.b-high{background:#3d1515;color:var(--red);}
.b-med{background:#1a2d3d;color:var(--blue);}
.b-low{background:#2d2a10;color:var(--yellow);}
.b-rest{background:#1a1a1f;color:var(--muted);}

/* ─── DAY DETAIL ───────────────────────────────────────────────────────────── */
.detail-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.detail-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.detail-head .big{font-size:26px;}
.detail-head h2{font-family:var(--font-head);font-size:18px;line-height:1.2;}
.detail-head .dmeta{font-size:11px;color:var(--muted);margin-top:2px;}

/* ─── ACCORDION ────────────────────────────────────────────────────────────── */
.acc{border-bottom:1px solid var(--border);}
.acc:last-child{border-bottom:none;}
.acc-btn{
  width:100%;padding:11px 16px;background:none;border:none;
  color:var(--text);font-family:var(--font);font-size:13px;font-weight:600;
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;text-align:left;
}
.acc-btn:active{background:var(--surface2);}
.acc-left{display:flex;align-items:center;gap:7px;}
.acc-left i{font-size:15px;color:var(--green);}
.chev{font-size:15px;color:var(--muted);transition:transform .2s;}
.chev.open{transform:rotate(180deg);}
.acc-body{padding:0 16px 12px;display:none;}
.acc-body.open{display:block;}

/* ─── EXERCISE ROW ─────────────────────────────────────────────────────────── */
.ex-row{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:1px solid var(--border);}
.ex-row:last-child{border-bottom:none;}
.ex-check{margin-top:2px;width:16px;height:16px;accent-color:var(--green);cursor:pointer;flex-shrink:0;}
.ex-info{flex:1;min-width:0;}
.ex-name{font-weight:600;font-size:13px;}
.ex-name.done{text-decoration:line-through;color:var(--muted);}
.prog{display:inline-block;background:var(--green-dim);color:var(--green);font-size:10px;padding:1px 6px;border-radius:8px;margin-left:5px;font-weight:600;}
.ex-meta{font-size:12px;color:var(--muted);margin-top:2px;}
.ex-note{font-size:11px;color:#5a8a5a;margin-top:3px;font-style:italic;line-height:1.4;}

/* ─── RECOVERY TAB ─────────────────────────────────────────────────────────── */
.bp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;margin-bottom:18px;}
.bp-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 8px;cursor:pointer;text-align:center;transition:border-color .15s;
  user-select:none;
}
.bp-card:active{opacity:.8;}
.bp-card.selected{border-color:var(--red);background:#2a1515;}
.bp-emoji{font-size:24px;display:block;margin-bottom:6px;}
.bp-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.3;}
.bp-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.rec-detail{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.rec-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;}
.rec-head .rh-emoji{font-size:26px;}
.rec-head h2{font-family:var(--font-head);font-size:18px;}
.rec-head .rh-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.rec-ex{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);}
.rec-ex:last-child{border-bottom:none;}
.rec-ex-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.rec-ex-dot.stretch{background:var(--blue);}
.rec-ex-dot.strength{background:var(--green);}
.rec-ex-info .re-name{font-weight:600;font-size:13px;}
.rec-ex-info .re-detail{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}
.rec-note{background:var(--green-dim);border:1px solid var(--green);border-radius:8px;padding:10px 14px;margin:14px 16px;font-size:12px;color:var(--muted);line-height:1.6;}
.rec-note strong{color:var(--green);}
.rec-legend{display:flex;gap:14px;padding:10px 16px;border-top:1px solid var(--border);}
.leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.leg-dot{width:7px;height:7px;border-radius:50%;}

/* ─── WEIGHT TRACKER ───────────────────────────────────────────────────────── */
.wt-wrap{margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);}
.wt-row{display:flex;align-items:flex-end;gap:6px;flex-wrap:wrap;}
.wt-set{display:flex;flex-direction:column;align-items:center;gap:3px;}
.wt-label{font-size:10px;color:var(--muted);letter-spacing:.3px;}
.wt-input{
  width:56px;padding:5px 4px;background:var(--surface2);
  border:1px solid var(--border);border-radius:6px;
  color:var(--text);font-size:13px;font-family:var(--font);
  text-align:center;-moz-appearance:textfield;
}
.wt-input::-webkit-outer-spin-button,.wt-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.wt-input:focus{outline:none;border-color:var(--green);}
.wt-input.has-val{border-color:#2a4a35;color:var(--green);}
.wt-unit{font-size:11px;color:var(--muted);padding-bottom:6px;flex-shrink:0;}
.wt-prev{font-size:10px;color:var(--muted);margin-top:5px;font-style:italic;}
.wt-prev span{color:#4a6a4a;}

/* ─── SIMPLE LIST ──────────────────────────────────────────────────────────── */
.slist{list-style:none;}
.slist li{display:flex;align-items:flex-start;gap:7px;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.slist li:last-child{border-bottom:none;}
.slist .si{color:var(--green);font-size:13px;margin-top:1px;flex-shrink:0;}

/* ─── REST DAY MSG ─────────────────────────────────────────────────────────── */
.rest-msg{padding:28px 16px;text-align:center;}
.rest-emoji{font-size:42px;margin-bottom:10px;}
.rest-title{font-weight:700;font-size:15px;color:var(--text);margin-bottom:8px;}
.rest-msg p{font-size:13px;color:var(--muted);line-height:1.7;}
.hl{color:var(--green);}

/* ─── CARD ─────────────────────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;}
.card h3{font-size:13px;font-weight:700;color:var(--green);margin-bottom:12px;display:flex;align-items:center;gap:5px;}

/* ─── DIET ─────────────────────────────────────────────────────────────────── */
.meal-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--border);}
.meal-row:last-of-type{border-bottom:none;}
.m-left{flex:1;min-width:0;}
.m-name{font-weight:700;font-size:13px;}
.m-time{color:var(--muted);font-weight:400;font-size:11px;margin-left:5px;}
.m-desc{font-size:12px;color:var(--muted);margin-top:2px;}
.m-tip{font-size:11px;color:#4a6a4a;margin-top:3px;font-style:italic;}
.m-right{text-align:right;flex-shrink:0;margin-left:10px;}
.m-cal{color:var(--green);font-weight:700;font-size:14px;}
.m-prot{font-size:11px;color:var(--muted);margin-top:1px;}
.totals-row{display:flex;justify-content:flex-end;gap:18px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.tot{text-align:right;}
.tot-label{font-size:10px;color:var(--muted);}
.tot-val{font-size:16px;font-weight:700;color:var(--green);}

.grocery-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.g-item{display:flex;justify-content:space-between;padding:7px 9px;background:var(--surface2);border-radius:6px;font-size:12px;gap:6px;align-items:center;}
.g-price{color:var(--green);font-weight:600;flex-shrink:0;}
.total-bar{background:var(--green-dim);border:1px solid var(--green);border-radius:8px;padding:11px 14px;display:flex;justify-content:space-between;align-items:center;margin-top:10px;}
.total-bar span:first-child{font-size:13px;font-weight:600;}
.total-bar span:last-child{font-size:20px;font-weight:700;color:var(--green);}

/* ─── PROGRESS ─────────────────────────────────────────────────────────────── */
.phase-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.phase-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:13px 14px;}
.phase-card.cur{border-color:var(--green);}
.ph-wk{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;}
.ph-name{font-weight:700;font-size:14px;margin:3px 0 2px;}
.ph-cur{font-size:10px;background:var(--green-dim);color:var(--green);display:inline-block;padding:1px 7px;border-radius:8px;margin-bottom:5px;font-weight:600;}
.ph-focus{font-size:11px;color:var(--blue);line-height:1.45;}
.lift-table{width:100%;border-collapse:collapse;}
.lift-table th{text-align:left;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:7px 9px;border-bottom:1px solid var(--border);}
.lift-table td{padding:9px 9px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle;}
.lift-table tr:last-child td{border-bottom:none;}
.tgt{color:var(--green);font-weight:700;}
.pbar{height:4px;background:var(--surface2);border-radius:2px;margin-top:4px;width:90px;}
.pbar-fill{height:4px;background:var(--green);border-radius:2px;}

/* ─── REALITY ──────────────────────────────────────────────────────────────── */
.ri{padding:13px 0;border-bottom:1px solid var(--border);}
.ri:last-child{border-bottom:none;}
.ri-head{display:flex;align-items:center;gap:7px;margin-bottom:5px;}
.ri-head i{font-size:17px;}
.ri-head h3{font-weight:700;font-size:13px;}
.ri-body{font-size:13px;color:var(--muted);line-height:1.6;}
.rules-list{list-style:none;}
.rules-list li{display:flex;align-items:flex-start;gap:9px;padding:9px 0;border-bottom:1px solid var(--border);}
.rules-list li:last-child{border-bottom:none;}
.rule-n{background:var(--green-dim);color:var(--green);font-weight:700;font-size:11px;width:21px;height:21px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.rule-t{font-weight:700;font-size:13px;}
.rule-d{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.5;}
</style>
</head>

function Accordion({title, icon, defaultOpen, children}) {
  const [open, setOpen] = useState(!!defaultOpen);

// Parse number of sets from strings like "4×5", "3×8–12", "4×max", "3×8/leg"
function parseSets(setsStr) {
  if (!setsStr) return null;
  const m = String(setsStr).match(/^(\d+)[×x]/);
  if (!m) return null;
  const n = parseInt(m[1]);
  return (n >= 1 && n <= 8) ? n : null;
}

// localStorage helpers (keyed per week + day + exercise)
function wtKey(week, dayId, exName) {
  return 'bx-w'+week+'-d'+dayId+'-'+exName.replace(/\s+/g,'_').toLowerCase();
}
function loadWt(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; }
}
function saveWt(key, arr) {
  try { localStorage.setItem(key, JSON.stringify(arr)); } catch {}
}

function WeightTracker({exName, dayId, week, numSets}) {
  const key     = wtKey(week, dayId, exName);
  const prevKey = wtKey(week - 1, dayId, exName);
  const prev    = loadWt(prevKey);
  const [weights, setWeights] = useState(() => {
    const saved = loadWt(key);
    return Array.from({length: numSets}, (_, i) => saved[i] || '');
  });
  const update = (i, val) => {
    const next = [...weights];
    next[i] = val;
    setWeights(next);
    saveWt(key, next);
  };
  const hasPrev = prev.some(v => v !== '' && v != null);
  return React.createElement('div', {className:'wt-wrap'},
    React.createElement('div', {className:'wt-row'},
      Array.from({length: numSets}, (_, i) =>
        React.createElement('div', {key:i, className:'wt-set'},
          React.createElement('div', {className:'wt-label'}, 'S'+(i+1)),
          React.createElement('input', {
            type:'number', inputMode:'numeric', className:'wt-input'+(weights[i]?' has-val':''),
            value: weights[i], placeholder: prev[i] || '—',
            onChange: e => update(i, e.target.value)
          })
        )
      ),
      React.createElement('div', {className:'wt-unit'}, 'lbs')
    ),
    hasPrev && React.createElement('div', {className:'wt-prev'},
      'Last week: ',
      React.createElement('span', null,
        prev.filter(v=>v).map((v,i)=>'S'+(i+1)+': '+v+'lbs').join(' · ')
      )
    )
  );
}

function ExRow({ex, week, dayId, trackWeight}) {
  const [done, setDone] = useState(false);
  const numSets = trackWeight ? parseSets(ex.sets) : null;
  return React.createElement('div', {className:'ex-row'},
    React.createElement('input', {type:'checkbox', className:'ex-check', checked:done, onChange:()=>setDone(!done)}),
    React.createElement('div', {className:'ex-info'},
      React.createElement('div', {className:'ex-name'+(done?' done':'')},
        ex.name,
        ex.prog && React.createElement('span', {className:'prog'}, ex.prog)

        ex.rest && ex.rest!=='—' ? ' — rest '+ex.rest : ''
      ),
      ex.note && React.createElement('div', {className:'ex-note'}, ex.note),
      numSets && React.createElement(WeightTracker, {exName:ex.name, dayId, week, numSets})
    )
  );
}

// ── APP ────────────────────────────────────────────────────────────────────────
const PHASE_NAMES = ['Foundation','Foundation','Foundation','Foundation','Build','Build','Build','Build','Intensity','Intensity','Intensity','Deload'];
const PHASE_COLORS = {Foundation:'var(--blue)',Build:'var(--green)',Intensity:'var(--orange)',Deload:'var(--yellow)'};
const TAB_DEFS = [
  ['schedule','Schedule','ti ti-calendar'],
  ['diet','Diet','ti ti-salad'],
  ['progress','Progress','ti ti-chart-bar'],
  ['reality','Reality','ti ti-info-circle'],
  ['recovery','Recovery','ti ti-first-aid-kit'],
];

function App() {
  const [tab,  setTab]  = useState('schedule');
  const [week, setWeek] = useState(1);
  const phase = PHASE_NAMES[Math.min(week-1,11)];

  return React.createElement('div', {className:'app'},
    React.createElement('div', {className:'header'},
      React.createElement('h1', null, '🥊 Boxing Program'),
      React.createElement('p', {className:'sub'}, ME.name+' · '+ME.weight+' · Age '+ME.age+' · '+ME.class),
      React.createElement('div', {className:'week-badge'},
        React.createElement('button', {onClick:()=>setWeek(Math.max(1,week-1))}, '‹'),
        'Week ', React.createElement('span',{className:'wnum'},week), ' / 12 · ',
        React.createElement('span',{style:{color:PHASE_COLORS[phase],fontWeight:600}},phase),
        React.createElement('button',{onClick:()=>setWeek(Math.min(12,week+1))}, '›')
      )
    ),
    React.createElement('div', {className:'tabs-bar'},
      TAB_DEFS.map(([id,label,icon])=>React.createElement('button',{
        key:id, className:'tab-btn'+(tab===id?' active':''), onClick:()=>setTab(id)
      },
        React.createElement('i',{className:icon}), label
      ))
    ),
    tab==='schedule' && React.createElement(ScheduleTab,{week}),
    tab==='diet'     && React.createElement(DietTab,null),
    tab==='progress' && React.createElement(ProgressTab,{week}),
    tab==='reality'  && React.createElement(RealityTab,null),
    tab==='recovery' && React.createElement(RecoveryTab,null)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
